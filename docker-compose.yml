version: '3.8'

services:
  # =========================================
  # Бот (FastAPI приложение)
  # =========================================
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onboarding_bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://bot_user:password@db:5432/onboarding_bot
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BITRIX_WEBHOOK_SECRET=${BITRIX_WEBHOOK_SECRET}
      - TIMEZONE=Europe/Moscow
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - bot_network

  # =========================================
  # База данных
  # =========================================
  db:
    image: postgres:15-alpine
    container_name: onboarding_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=onboarding_bot
      - POSTGRES_USER=bot_user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Redis (кэш, очереди)
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: onboarding_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================
  # Nginx (reverse proxy)
  # =========================================
  nginx:
    image: nginx:alpine
    container_name: onboarding_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - bot
    networks:
      - bot_network

volumes:
  postgres_data:
  redis_data:

networks:
  bot_network:
    driver: bridge
